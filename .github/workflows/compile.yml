name: Compile and Release ZeusOnlyMode

on:
  push:
    branches:
      - main # Automatically runs when you push or merge to the main branch
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Plugin
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # IMPORTANT: Required to fetch past tags so it knows what version is next

      - name: Bump Version and Create Tag
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch # By default, bumps the last number (e.g., v1.0.0 -> v1.0.1)

      - name: Setup .NET 8.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore Dependencies
        run: dotnet restore ZeusOnlyMode.csproj

      - name: Build and Publish
        run: dotnet publish ZeusOnlyMode.csproj -c Release -o ./publish_temp

      - name: Prepare Folder Structure
        run: |
          mkdir -p ./release_stage/addons/counterstrikesharp/plugins/ZeusOnlyMode
          mv ./publish_temp/* ./release_stage/addons/counterstrikesharp/plugins/ZeusOnlyMode/

      - name: Zip Release Artifact
        # Uses the new tag generated in the step above
        run: |
          cd release_stage
          zip -r "ZeusOnlyMode-${{ steps.tag_version.outputs.new_tag }}.zip" addons/

      - name: Upload Build Artifact (Actions Tab)
        uses: actions/upload-artifact@v4
        with:
          name: ZeusOnlyMode-${{ steps.tag_version.outputs.new_tag }}
          path: release_stage/ZeusOnlyMode-${{ steps.tag_version.outputs.new_tag }}.zip
          retention-days: 7

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag_version.outputs.new_tag }}
          files: release_stage/ZeusOnlyMode-${{ steps.tag_version.outputs.new_tag }}.zip
          generate_release_notes: true
