name: Compile and Release ZeusOnlyMode

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build Plugin
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET 8.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore Dependencies
        run: dotnet restore ZeusOnlyMode.csproj

      - name: Build and Publish
        # Publish to a temporary directory first
        run: dotnet publish ZeusOnlyMode.csproj -c Release -o ./publish_temp

      - name: Prepare Folder Structure
        # Create the exact CounterStrikeSharp folder structure and move files into it
        run: |
          mkdir -p ./release_stage/addons/counterstrikesharp/plugins/ZeusOnlyMode
          mv ./publish_temp/* ./release_stage/addons/counterstrikesharp/plugins/ZeusOnlyMode/

      - name: Zip Release Artifact
        # Name the zip dynamically using github.ref_name (e.g., ZeusOnlyMode-v1.0.0.zip)
        run: |
          cd release_stage
          zip -r "ZeusOnlyMode-${{ github.ref_name }}.zip" addons/

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ZeusOnlyMode-${{ github.ref_name }}
          path: release_stage/ZeusOnlyMode-${{ github.ref_name }}.zip
          retention-days: 7
